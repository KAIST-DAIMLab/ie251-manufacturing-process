# 18-node 6x3 grid. Origin at Gazebo world frame.
# Robot spawns at A1 (0.5, 0.5).
nodes:
  A1: {x: 0.5, y: 0.5}
  A2: {x: 1.5, y: 0.5}
  A3: {x: 2.5, y: 0.5}
  A4: {x: 3.5, y: 0.5}
  A5: {x: 4.5, y: 0.5}
  A6: {x: 5.5, y: 0.5}
  B1: {x: 0.5, y: 1.5}
  B2: {x: 1.5, y: 1.5}
  B3: {x: 2.5, y: 1.5}
  B4: {x: 3.5, y: 1.5}
  B5: {x: 4.5, y: 1.5}
  B6: {x: 5.5, y: 1.5}
  C1: {x: 0.5, y: 2.5}
  C2: {x: 1.5, y: 2.5}
  C3: {x: 2.5, y: 2.5}
  C4: {x: 3.5, y: 2.5}
  C5: {x: 4.5, y: 2.5}
  C6: {x: 5.5, y: 2.5}

edges:
  # Row A (bottom)
  - [A1, A2]
  - [A2, A3]
  - [A3, A4]
  - [A4, A5]
  - [A5, A6]
  # Row B (middle)
  - [B1, B2]
  - [B2, B3]
  - [B3, B4]
  - [B4, B5]
  - [B5, B6]
  # Row C (top)
  - [C1, C2]
  - [C2, C3]
  - [C3, C4]
  - [C4, C5]
  - [C5, C6]
  # Columns (A-B)
  - [A1, B1]
  - [A2, B2]
  - [A3, B3]
  - [A4, B4]
  - [A5, B5]
  - [A6, B6]
  # Columns (B-C)
  - [B1, C1]
  - [B2, C2]
  - [B3, C3]
  - [B4, C4]
  - [B5, C5]
  - [B6, C6]
